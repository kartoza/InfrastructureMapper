# SPDX-License-Identifier:
# Precommit configuration file for managing code quality checks and formatting tools.
# This file defines various hooks for linting, formatting, security checks, and more.
# For more information, see https://pre-commit.com
# You can run individual hooks to check them - some also accept a arguments
# to e.g. run in verify mode.
# To run all hooks, use `pre-commit run --all-files`
# To run a single hook, use `pre-commit run <hook_id> --all-files`
# To run a single hook verbosely, use `pre-commit run <hook_id> --all-files -v`
# Tim Sutton, 2025

# Install both pre-commit and pre-push hook types from a single
# `pre-commit install`. Pre-push gates mirror what CI runs so a clean
# local push can't get rejected on broken docs / stale immutability.
default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]

repos:
  - repo: https://github.com/psf/black
    rev: 24.4.0
    hooks:
      - id: black
        name: "🖤 black"
        language_version: python3
        additional_dependencies: []
        args: [sql]
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.0.7
    hooks:
      - id: sqlfluff-lint
        name: "🧹 sqlfluff-lint"
        entry: sqlfluff lint
        language: python
        types: [sql]
      - id: sqlfluff-fix
        name: "🛠️ sqlfluff-fix"
        entry: sqlfluff fix --force
        language: python
        types: [sql]
  - repo: local
    hooks:
      - id: schema-immutability
        name: "🔒 Schema immutability + Issue-NNN annotation"
        entry: bash scripts/check_schema_immutability.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]
  # Push-time gates. These mirror what the GitHub workflows do, so a clean
  # local push won't get rejected by CI on broken docs or a stale immutability
  # check. They are heavier than the commit-time hooks (the docs build spins
  # up Postgres), so they only fire on `git push`.
  - repo: local
    hooks:
      - id: schema-immutability-vs-main
        name: "🔒 Schema immutability vs origin/main (CI parity)"
        entry: bash scripts/check_schema_immutability.sh --all
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      - id: docs-strict-build
        name: "📚 mkdocs build --strict (CI parity)"
        entry: bash scripts/docs_build.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      - id: docs-schema-reference
        name: "📚 Regenerate schema docs (catches Docs.yml failures)"
        entry: python scripts/generate_schema_docs.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
  - repo: local
    hooks:
      - id: remove-core-file
        name: "🗑️ Remove core file if it exists"
        entry: bash -c '[[ -f core && ! -d core ]] && rm core || exit 0'
        language: system
        stages:
          - pre-commit
  - repo: local
    hooks:
      - id: ensure-utf8-encoding
        name: "🌐 Ensure UTF-8 encoding declaration in Python files"
        entry: bash scripts/encoding_check.sh
        language: system
        types: [python]
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: ensure-license-header
        name: "📄 Ensure license, copyright, and Kartoza link"
        entry: bash scripts/license_check.sh
        language: system
        types: [python, shell, sql]
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: ensure-google-docstrings
        name: "📚 Ensure Google-style docstrings in Python modules"
        entry: bash scripts/docstrings_check.sh
        language: system
        types: [python]
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: code-size-feedback
        name: "📏 Code Size Feedback"
        entry: bash scripts/codebase_size_check.sh
        language: system
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: test-count-feedback
        name: "🧪 Test Count Feedback"
        entry: python scripts/commit_test_stats.py
        language: system
        types: [python]
        stages: [pre-commit]
  - repo: https://github.com/PyCQA/isort
    rev: 6.0.1
    hooks:
      - id: isort
        name: "📦 isort - sort Python imports"
        entry: isort --check --diff
        language: python
        types: [python]
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: nixfmt
        name: "❄️ Nixfmt (RFC style)"
        description: Format Nix code with nixfmt-rfc-style
        entry: nixfmt
        language: system
        args: ["--"]
        types: [nix]
  - repo: local
    hooks:
      - id: markdownlint
        name: "📝 markdownlint - Markdown linter"
        entry: markdownlint
        language: system
        types: [markdown]
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: cspell
        name: "🔤 cspell - Spell checker for Markdown"
        entry: cspell --no-progress --no-summary
        language: system
        types: [markdown]
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: yamllint
        name: "🔍 yamllint - YAML linter"
        entry: yamllint
        language: system
        types: [yaml]
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: actionlint
        name: "🤖 actionlint - GitHub Actions workflow linter"
        entry: actionlint
        language: system
        types: [yaml]
        files: ^\.github/workflows/.*\.ya?ml$
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: bandit-sql
        name: "🔒 Bandit - Python security analysis"
        # --skip B404: subprocess is used intentionally by the migration +
        # build pipelines; every call site is audited (list form, no shell).
        entry: bandit -r sql --skip B404,B603,B607
        language: system
        pass_filenames: false  # bandit -r already targets the whole sql/ tree
        types: [python]
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: bandit-scripts
        name: "🔒 Bandit - Python security analysis"
        entry: bandit -r scripts --skip B404,B603,B607
        language: system
        pass_filenames: false  # bandit -r already targets the whole scripts/ tree
        types: [python]
        stages: [pre-commit]
  # Bearer doesn't support SQL — its detectors only ship for Python, Ruby,
  # JS, Java, Go, PHP. The SQL pass returned "report not yet available" and
  # failed every commit. Removed; bearer-scripts still covers the bash + py.
  - repo: local
    hooks:
      - id: bearer-scripts
        name: "🛡️ Bearer - Security & privacy scanner"
        entry: bearer scan --exit-code 1 scripts
        language: system
        pass_filenames: false
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: semgrep-scripts
        name: "🔍 Semgrep - Static analysis"
        entry: semgrep --config=auto scripts
        language: system
        types: [python]
        stages: [pre-commit]
  # CodeQL, Snyk, and Codecov are CI-only: CodeQL needs a pre-built DB,
  # Snyk needs an API token in the environment, Codecov uploads coverage
  # to codecov.io. They belong in GitHub Actions, not local pre-commit.

  # This must run before reuse license compliance check
  - repo: local
    hooks:
    - id: add-spdx-headers
      name: "📄 Add SPDX headers if missing"
      entry: scripts/add_spdx_headers.sh
      language: script
      files: \.(py|sh|sql|md|yaml|yml|json|nix|txt|toml|conf|env)$
      stages: [pre-commit]

  - repo: local
    hooks:
      - id: reuse
        name: "📄 REUSE - License compliance"
        entry: reuse lint
        language: system
        always_run: true # Ensures it runs on all files, not just staged ones
        pass_filenames: false # reuse lint scans the whole tree; no positional args
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: pylint
        name: "🦉 Pylint - Python linter"
        # .pylintrc handles ignore-paths (.venv/, site/, pgdata/, etc.)
        entry: pylint scripts
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]
  # Fix end of files. Frozen schema files are excluded — the immutability
  # gate treats baseline SQL as content-addressed; an auto-fix here would
  # silently mutate it and then trip the gate in CI (where origin/main is
  # current and bootstrap mode can't hide the change).
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^sql/([0-9].*\.sql|extensions\.sql|fixtures\.sql|migrations/(pg|gpkg)/v.*\.sql)$'
      - id: end-of-file-fixer
        exclude: '^sql/([0-9].*\.sql|extensions\.sql|fixtures\.sql|migrations/(pg|gpkg)/v.*\.sql)$'
      - id: mixed-line-ending
        args:
          - '--fix=lf'
        exclude: '^sql/([0-9].*\.sql|extensions\.sql|fixtures\.sql|migrations/(pg|gpkg)/v.*\.sql)$'
  # Remove unused imports/variables
  - repo: https://github.com/myint/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
        args:
          - "--in-place"
          - "--remove-unused-variables"
          - "--remove-all-unused-imports"
