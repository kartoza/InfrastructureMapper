name: 📚 Docs

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'sql/**'
      - 'scripts/generate_schema_docs.py'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/Docs.yml'
  workflow_dispatch:

# Allow only one concurrent deploy, but don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_USER: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: '5432'
      PGUSER: ci
      PGPASSWORD: ci
    steps:
      - name: Checkout (full history for git-revision dates)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Regenerate per-component schema reference
        run: |
          nix develop --command python scripts/generate_schema_docs.py

      - name: Build mkdocs site (strict)
        run: |
          nix develop --command mkdocs build --strict --site-dir site

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
