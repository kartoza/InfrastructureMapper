name: 👁️ Spelling Checks
on:
  pull_request:
  push:
    branches: [main, master]
jobs:
  cspell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v22
      - run: nix develop --command cspell --no-progress --no-summary '**/*.md'
