name: 👨🏽 SQL Checks
on:
  pull_request:
  push:
    branches: [main, master]
jobs:
  sqlfluff-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v23
      - uses: DeterminateSystems/magic-nix-cache-action@v17
      - run: nix develop --command sqlfluff lint sql/
  sqlfluff-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v23
      - uses: DeterminateSystems/magic-nix-cache-action@v17
      - run: nix develop --command sqlfluff fix --check sql/
