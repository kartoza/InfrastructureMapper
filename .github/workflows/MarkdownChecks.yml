name: ✏️ Markdown Checks
on:
  pull_request:
  push:
    branches: [main, master]
jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v22
      - run: nix develop --command markdownlint '**/*.md'
