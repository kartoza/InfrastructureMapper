version = 1
SPDX-PackageName = "Infrastructure Mapper"
SPDX-PackageSupplier = "Tim Sutton <tim@kartoza.com>"
SPDX-PackageDownloadLocation = "https://github.com/kartoza/InfrastructureMapper"

[[annotations]]
path = [".envrc", ".gitignore", ".pre-commit-config.yaml", ".pylintrc", ".sqlfluff", ".yamllint", "VERSION", "flake.lock", "cspell.config.yaml", "diagrams/**", "docs/assets/**", "img/**", "img/interns/**", "presentations/**", "qgis_projects/**", "qml/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "Tim Sutton"
SPDX-License-Identifier = "MIT"

# Kartoza Brand Pack assets — copied in from the brand repo, owned and
# licensed by Kartoza. Used here under the project's MIT umbrella.
[[annotations]]
path = ["docs/assets/brand/**", "docs/stylesheets/kartoza-tokens.css"]
precedence = "aggregate"
SPDX-FileCopyrightText = "Kartoza (Pty) Ltd"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = ["img/food-services.png"]
precedence = "aggregate"
SPDX-FileCopyrightText = "Various (see docs/about/icon-licenses.md)"
SPDX-License-Identifier = "MIT"
