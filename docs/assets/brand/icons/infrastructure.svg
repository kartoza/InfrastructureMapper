<!-- Three connected nodes — echoes the Kartoza trefoil. "Infrastructure
     as a network of things". Charcoal / Blue / Amber. -->
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Infrastructure">
  <line x1="20" y1="46" x2="44" y2="46" stroke="#383939" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="46" x2="32" y2="20" stroke="#383939" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="44" y1="46" x2="32" y2="20" stroke="#383939" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="18" r="9" fill="#EEB348" stroke="#383939" stroke-width="2.5"/>
  <circle cx="18" cy="46" r="9" fill="#54A2CC" stroke="#383939" stroke-width="2.5"/>
  <circle cx="46" cy="46" r="9" fill="#F5F5F2" stroke="#383939" stroke-width="2.5"/>
</svg>
