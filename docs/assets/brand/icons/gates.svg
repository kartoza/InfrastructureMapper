  <circle cx="9"  cy="11" r="3.5" fill="#383939"/>
  <rect x="6"  y="14" width="6" height="44" rx="1" fill="#383939"/>
  <circle cx="55" cy="11" r="3.5" fill="#383939"/>
  <rect x="52" y="14" width="6" height="44" rx="1" fill="#383939"/>
  <rect x="14" y="20" width="36" height="32" rx="2"
        fill="none" stroke="#383939" stroke-width="2.5"
        stroke-linejoin="round"/>
  <line x1="14" y1="36" x2="50" y2="36"
        stroke="#383939" stroke-width="2.5"/>
  <line x1="16" y1="50" x2="48" y2="22"
        stroke="#54A2CC" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="12" y="24" width="6" height="4"
        fill="#EEB348" stroke="#383939" stroke-width="1.5"/>
  <rect x="12" y="44" width="6" height="4"
        fill="#EEB348" stroke="#383939" stroke-width="1.5"/>
</svg>
