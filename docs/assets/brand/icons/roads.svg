<!-- Cross-roads from above: two Light-Grey asphalt strips, Blue dashed
     centre lines on each, and an Amber roundabout dot in the middle. -->
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Roads">
  <rect x="2"  y="22" width="60" height="20"
        fill="#D1D1D1" stroke="#383939" stroke-width="2.5"/>
  <rect x="22" y="2"  width="20" height="60"
        fill="#D1D1D1" stroke="#383939" stroke-width="2.5"/>
  <rect x="22" y="22" width="20" height="20" fill="#D1D1D1"/>
  <line x1="2"  y1="32" x2="20" y2="32"
        stroke="#54A2CC" stroke-width="2" stroke-dasharray="3 3" stroke-linecap="round"/>
  <line x1="44" y1="32" x2="62" y2="32"
        stroke="#54A2CC" stroke-width="2" stroke-dasharray="3 3" stroke-linecap="round"/>
  <line x1="32" y1="2"  x2="32" y2="20"
        stroke="#54A2CC" stroke-width="2" stroke-dasharray="3 3" stroke-linecap="round"/>
  <line x1="32" y1="44" x2="32" y2="62"
        stroke="#54A2CC" stroke-width="2" stroke-dasharray="3 3" stroke-linecap="round"/>
  <circle cx="32" cy="32" r="5"
          fill="#EEB348" stroke="#383939" stroke-width="2"/>
</svg>
