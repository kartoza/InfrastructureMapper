#
# markdownlint configuration. Rules disabled below are intentional project
# policy: presentations use Marp frontmatter and inline HTML, our prose
# tolerates long lines, and tables aren't column-style-managed.
MD003: false        # allow either atx or setext headings (Marp presentations mix them)
MD013: false        # don't enforce a maximum line length
MD022: false        # allow headings without surrounding blank lines (Marp frontmatter)
MD033: false        # allow inline HTML (used in presentations and tables)
MD041: false        # allow non-heading first lines (Marp '---' frontmatter)
MD060: false        # don't enforce table-column compact style
